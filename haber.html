<!DOCTYPE html>
<html class="dark" lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Haber Detayı - PhysicaNova</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#2F4F6F",
                        "primary-hover": "#1E3A52",
                        "paper": "#F5F2EA",
                        "surface": "#ECE7DE",
                        "ink": "#1F2933",
                        "ink-light": "#475569",
                        "border-soft": "#D6D3CD",
                        "accent": "#B56A4A"
                    },
                    fontFamily: {
                        "display": ["Lora", "serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    boxShadow: {
                        "academic": "0 4px 12px rgba(31, 41, 51, 0.05)"
                    }
                },
            },
        }
    </script>
    <style>
        /* Portable Text içerik stillendirmesi */
        .portable-text h2 { font-size: 1.5rem; font-weight: 700; color: #1F2933; margin-top: 2rem; margin-bottom: 1rem; font-family: 'Lora', serif;}
        .portable-text h3 { font-size: 1.25rem; font-weight: 600; color: #1F2933; margin-top: 1.5rem; margin-bottom: 0.75rem; font-family: 'Lora', serif;}
        .portable-text p { margin-bottom: 1rem; line-height: 1.75; color: #475569; }
        .portable-text ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #475569; }
        .portable-text ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: #475569; }
        .portable-text a { color: #2F4F6F; text-decoration: underline; }
        .portable-text a:hover { color: #1E3A52; }
        .portable-text strong { color: #1F2933; font-weight: 600; }
        .portable-text blockquote { border-left: 4px solid #2F4F6F; padding-left: 1rem; font-style: italic; margin-left: 0; margin-bottom: 1rem; color: #475569; background: rgba(47, 79, 111, 0.05); padding-top: 0.5rem; padding-bottom: 0.5rem; border-radius: 0 4px 4px 0; }
    </style>
</head>

<body class="bg-paper text-ink antialiased min-h-screen flex flex-col font-body">
    <!-- Header / Navbar -->
    <header class="flex items-center justify-between whitespace-nowrap border-b border-border-soft bg-surface px-6 lg:px-10 py-4 sticky top-0 z-50">
        <div class="flex items-center gap-8">
            <a href="index.html" class="flex items-center gap-3 text-ink hover:text-primary transition-colors">
                <div class="size-8 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-3xl">science</span>
                </div>
                <h2 class="text-ink text-xl font-bold leading-tight tracking-tight font-display">Physica<span class="font-normal">Nova</span></h2>
            </a>
            <nav class="hidden lg:flex items-center gap-8">
                <a class="text-ink-light text-sm font-medium hover:text-primary transition-colors" href="index.html">Simülasyonlar</a>
                <a class="text-ink-light text-sm font-medium hover:text-primary transition-colors" href="#">Konular</a>
                <a class="text-ink-light text-sm font-medium hover:text-primary transition-colors" href="#">Dersler</a>
                <a class="text-primary text-sm font-bold relative after:absolute after:bottom-[-16px] after:left-0 after:w-full after:h-0.5 after:bg-primary transition-colors" href="haberler.html">Haberler</a>
                <a class="text-ink-light text-sm font-medium hover:text-primary transition-colors" href="hakkimizda.html">Hakkımızda</a>
            </nav>
        </div>
        <div class="flex flex-1 justify-end gap-6 items-center">
            <label class="hidden md:flex flex-col min-w-40 !h-10 max-w-64">
                <div class="flex w-full flex-1 items-stretch rounded h-full relative group">
                    <div class="text-ink-light absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                        <span class="material-symbols-outlined text-[18px]">search</span>
                    </div>
                    <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded text-ink focus:outline-none focus:border-primary border border-border-soft bg-paper placeholder:text-ink-light px-4 pl-10 text-sm font-normal transition-all"
                        placeholder="Haber veya duyuru ara..." value="" />
                </div>
            </label>
            <div class="flex items-center gap-3">
                <button class="flex items-center justify-center text-ink-light hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <div class="w-px h-6 bg-border-soft mx-1"></div>
                <button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded h-9 px-4 bg-paper border border-border-soft hover:border-primary/50 text-ink text-sm font-semibold transition-all shadow-sm">
                    <span class="truncate">Giriş Yap</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col py-10 px-6 relative overflow-y-auto bg-paper">
        <div class="max-w-3xl mx-auto w-full z-10">
            <a href="haberler.html" class="inline-flex items-center gap-2 text-ink-light hover:text-ink transition-colors mb-6 text-sm font-medium">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Haberlere Dön
            </a>

            <article id="news-detail-container">
                <!-- Data fetching in progress... -->
                <div class="flex flex-col items-center justify-center p-20 gap-4">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-primary"></div>
                    <p class="text-ink-light text-sm">İçerik yükleniyor...</p>
                </div>
            </article>
        </div>
    </main>

    <footer class="text-center py-6 text-ink-light text-sm border-t border-border-soft bg-surface mt-auto">
        <p>© 2026 PhysicaNova Project.</p>
    </footer>

    <script type="module" src="haber.js"></script>
</body>

</html>
