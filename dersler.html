<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dersler | PhysicaNova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            background-color: #F8F9FA;
            color: #212529;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background-color: #1B4332;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: #2D6A4F;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen overflow-x-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-[#DEE2E6] px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="font-bold text-xl flex items-center gap-2">
            <span class="text-[#1B4332] flex items-center gap-1">
                <span class="material-symbols-outlined text-[28px]">science</span>
                PhysicaNova
            </span> <span class="text-[#DEE2E6] font-normal mx-1">|</span> <span
                class="font-normal text-gray-700">Modern Lab</span>
        </a>
        <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-600">
            <a href="index.html" class="hover:text-[#1B4332]">Simülasyonlar</a>
            <a href="konular.html" class="hover:text-[#1B4332]">Konular</a>
            <a href="dersler.html" class="hover:text-[#1B4332] text-[#1B4332] font-bold">Dersler</a>
            <a href="haberler.html" class="hover:text-[#1B4332]">Haberler</a>
            <a href="hakkimizda.html" class="hover:text-[#1B4332]">Hakkımızda</a>
        </nav>
        <div class="flex items-center gap-4">
            <button
                class="flex items-center justify-center text-gray-500 hover:text-[#1B4332] transition-colors rounded border border-gray-300 px-3 py-1.5 font-semibold text-sm">
                Giriş Yap
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 lg:p-8 min-h-screen">
        <div class="mb-10 text-center lg:text-left">
            <h1 class="text-3xl font-bold text-gray-900 mb-3">Rehberli Öğrenme Rotaları</h1>
            <p class="text-gray-600 max-w-2xl mx-auto lg:mx-0">
                Hedefinize adım adım ulaşın. OpenStax University Physics Volume 3 müfredatıyla uyumlu, modüllere ayrılmış sistematik dersler sayesinde fiziği sıfırdan zirveye taşıyın.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="courses-container">
            <!-- Cards will be injected here via JS -->
        </div>
    </main>

    <footer style="text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.8rem; margin-top: auto; border-top: 1px solid #DEE2E6;">
        <p>© 2026 PhysicaNova</p>
    </footer>

    <script src="derslerData.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("courses-container");
            
            coursesData.forEach((course, index) => {
                const card = document.createElement("div");
                card.className = "bg-white border border-[#DEE2E6] rounded-xl p-6 shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row gap-6 relative overflow-hidden group";
                
                // Color mapping logic
                let diffColor = "bg-blue-100 text-blue-700";
                if(course.difficulty === "Orta") diffColor = "bg-yellow-100 text-yellow-700";
                if(course.difficulty === "İleri" || course.difficulty === "Zor") diffColor = "bg-red-100 text-red-700";

                card.innerHTML = `
                    <div class="absolute -right-4 -top-4 text-gray-50 text-9xl font-black italic opacity-50 group-hover:scale-110 transition-transform pointer-events-none">
                        ${index + 1}
                    </div>
                    
                    <div class="flex-1 flex flex-col z-10 relative">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-xs font-bold px-2 py-1 rounded ${diffColor}">${course.difficulty}</span>
                            <span class="text-xs font-semibold text-gray-500 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> ${course.duration}</span>
                        </div>
                        
                        <h2 class="text-xl font-bold text-gray-900 mb-2">${course.title}</h2>
                        <p class="text-sm text-gray-600 mb-4 line-clamp-2">${course.summary}</p>
                        
                        <div class="mb-5 flex-1">
                            <p class="text-xs text-gray-500 uppercase tracking-wide font-bold mb-1">Kazanım</p>
                            <p class="text-sm text-gray-800 font-medium italic">${course.goal}</p>
                        </div>
                        
                        <div class="flex items-center justify-between mt-auto">
                            <div class="text-sm font-medium text-gray-500 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[18px] text-[#1B4332]">science</span> ${course.simCount} Simülasyon
                            </div>
                            <a href="ders_detay.html?id=${course.id}" class="btn-primary text-sm font-bold flex items-center gap-1">
                                Derse Başla <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>

</html>
