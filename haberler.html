<!DOCTYPE html>
<html class="dark" lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Haberler - PhysicaNova</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "primary-hover": "#0f2cb8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                        "card-dark": "#161821",
                        "border-dark": "#282b39",
                        "text-secondary": "#9da1b9",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background-dark text-slate-100 antialiased min-h-screen flex flex-col font-body">
    <!-- Header / Navbar -->
    <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark bg-[#111218] px-6 lg:px-10 py-3 sticky top-0 z-50">
        <div class="flex items-center gap-8">
            <a href="index.html" class="flex items-center gap-3 text-white hover:opacity-80 transition-opacity">
                <div class="size-8 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-3xl">science</span>
                </div>
                <h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em] font-display">PhysicaNova</h2>
            </a>
            <nav class="hidden lg:flex items-center gap-9">
                <a class="text-text-secondary text-sm font-medium hover:text-white transition-colors"
                    href="index.html">Simülasyonlar</a>
                <a class="text-text-secondary text-sm font-medium hover:text-white transition-colors"
                    href="#">Konular</a>
                <a class="text-text-secondary text-sm font-medium hover:text-white transition-colors"
                    href="#">Dersler</a>
                <a class="text-white text-sm font-medium hover:text-primary transition-colors"
                    href="haberler.html">Haberler</a>
                <a class="text-text-secondary text-sm font-medium hover:text-white transition-colors"
                    href="hakkimizda.html">Hakkımızda</a>
            </nav>
        </div>
        <div class="flex flex-1 justify-end gap-6 items-center">
            <label class="hidden md:flex flex-col min-w-40 !h-10 max-w-64">
                <div class="flex w-full flex-1 items-stretch rounded-lg h-full relative group">
                    <div
                        class="text-text-secondary absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                        <span class="material-symbols-outlined text-[20px]">search</span>
                    </div>
                    <input id="searchInput"
                        class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-border-dark bg-card-dark focus:border-primary h-full placeholder:text-text-secondary px-4 pl-10 text-sm font-normal leading-normal transition-all"
                        placeholder="Ara..." value="" />
                </div>
            </label>
            <div class="flex items-center gap-3">
                <button class="flex items-center justify-center text-text-secondary hover:text-white">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <div class="w-px h-6 bg-border-dark mx-1"></div>
                <button
                    class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary hover:bg-primary-hover transition-colors text-white text-sm font-bold leading-normal tracking-[0.015em]">
                    <span class="truncate">Giriş Yap</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col py-10 px-6 relative overflow-y-auto">
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary/5 via-background-dark to-background-dark -z-10">
        </div>

        <div class="max-w-6xl mx-auto w-full z-10">
            <div class="flex items-center justify-between mb-8 pb-4 border-b border-border-dark">
                <h1 class="text-3xl font-display font-bold text-white flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary text-3xl">article</span>
                    Haberler & Duyurular
                </h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="news-container">
                <!-- Data fetching in progress... -->
                <div class="flex justify-center p-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary"></div>
                </div>
            </div>
        </div>
    </main>

    <footer
        style="text-align: center; padding: 1.5rem; color: #9da1b9; font-size: 0.85rem; border-top: 1px solid #282b39; background-color: #111218;">
        <p>© 2026 PhysicaNova</p>
    </footer>
    <script type="module" src="haberler.js"></script>
</body>

</html>
